name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建 VitePress
        run: npm run docs:build

      - name: Checkout 主站仓库
        uses: actions/checkout@v4
        with:
          repository: JackieAnxis/jackieanxis.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: main-site

      - name: 部署到主站子目录
        run: |
          rm -rf main-site/llm-for-everyone
          mkdir -p main-site/llm-for-everyone
          cp -r docs/.vitepress/dist/* main-site/llm-for-everyone/
          cd main-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llm-for-everyone/
          git diff --cached --quiet || git commit -m "deploy: update llm-for-everyone"
          git push

      - name: 构建产物 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: docs/.vitepress/dist
