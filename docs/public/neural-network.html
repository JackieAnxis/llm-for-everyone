<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>神经网络训练实验室</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%2377231d'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23faf9f7'/%3E%3C/svg%3E">
    <style>
        :root {
            --paper: #f5f0e6;
            --panel: #fbf7ed;
            --ink: #171717;
            --muted: #6c675e;
            --line: #cfc6b8;
            --line-dark: #958a7d;
            --red: #8d1f1f;
            --red-dark: #5d0d0d;
            --green: #16451f;
            --green-soft: #dbe5d8;
            --mono: "SF Mono", "Menlo", "Consolas", monospace;
            --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --serif: Georgia, "Times New Roman", serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #fff;
            color: var(--ink);
            font-family: var(--sans);
            line-height: 1.42;
        }

        .page {
            width: min(1920px, calc(100vw - 56px));
            margin: 0 auto;
            padding: 28px 0 24px;
        }

        .masthead {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 24px;
            align-items: start;
            padding: 0 16px 14px;
            border-bottom: 2px solid var(--line-dark);
        }

        .issue {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: var(--serif);
            font-size: clamp(40px, 4.2vw, 66px);
            font-weight: 500;
            line-height: 0.98;
            letter-spacing: 0;
        }

        .deck {
            max-width: 1050px;
            margin: 10px 0 0;
            font-family: var(--serif);
            font-size: clamp(18px, 1.6vw, 24px);
            color: #28251f;
        }

        .page-count {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 42px;
            font-family: var(--serif);
            font-size: 26px;
        }

        .device-note {
            display: grid;
            grid-template-columns: auto auto;
            gap: 10px;
            align-items: center;
            color: #403b34;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
        }

        .device-icons {
            display: flex;
            align-items: end;
            gap: 6px;
        }

        .monitor,
        .phone {
            display: inline-block;
            border: 2px solid var(--ink);
        }

        .monitor {
            width: 38px;
            height: 25px;
            position: relative;
        }

        .monitor::after {
            content: "";
            position: absolute;
            left: 13px;
            bottom: -9px;
            width: 12px;
            height: 8px;
            border-top: 2px solid var(--ink);
        }

        .phone {
            width: 13px;
            height: 26px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            grid-template-rows: 1fr minmax(160px, auto);
            grid-template-areas:
                "dataset  network"
                "loss     network";
            gap: 16px;
            padding: 16px 0 12px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            background: rgba(251, 247, 237, 0.74);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
        }

            grid-area: dataset;
            display: flex;
            flex-direction: row;
            min-width: 0;
            min-height: 0;
        }

        .dataset-panel .controls-bar {
            flex-direction: column;
            align-items: stretch;
            padding: 10px 0 10px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .dataset-panel .controls-bar label.inline {
            display: flex;
        }

        .network-panel {
            grid-area: network;
        }

        .training-strip {
            grid-area: controls;
        }

        .loss-panel {
            grid-area: loss;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: start;
            padding: 18px 22px 8px;
        }

        .dataset-panel .panel-header {
            padding-bottom: 4px;
        }

        .panel h2 {
            margin: 0;
            font-family: var(--serif);
            font-size: 30px;
            font-weight: 700;
        }

        .panel-note,
        .caption {

            font-size: 14px;

        .dataset-panel .panel-note {
            font-size: 13px;
        }

        .preset-controls {
            display: flex;

        svg {
            display: block;
            width: 100%;
        }

        #playground {
            flex: 1;
            height: 100%;
            min-height: 0;
        }

            display: grid;
            grid-template-columns: minmax(0, 1fr) 54px;

            flex-wrap: wrap;
            gap: 8px 14px;

            color: var(--muted);
            font-size: 12px;

        .legend-dot {
            display: inline-block;
            width: 11px;
            height: 11px;
            margin-right: 8px;
            border-radius: 50%;

            grid-template-rows: auto 1fr auto;
            gap: 8px;
            justify-items: center;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 12px;
            min-height: 0;

            font-family: var(--sans);
            font-weight: 700;
            color: #403b34;
            line-height: 1.2;
            text-align: center;

        .colorbar-ramp {
            width: 28px;
            min-height: 80px;
            max-height: 176px;
            height: 100%;
            border: 1px solid var(--line);

        .axis-label {
            fill: #29251f;
            font-family: var(--serif);
            font-size: 18px;
        }

        .point {
            stroke: rgba(251, 247, 237, 0.8);
            stroke-width: 2;
        }

            flex: 1;
            height: 100%;
            min-height: 0;
        }

            stroke-width: 1.2;

            font-family: var(--sans);
            font-size: 12px;

            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;

            gap: 20px;

            gap: 6px;

            color: var(--muted);
            font-size: 12px;

            min-width: 0;

            background: linear-gradient(180deg, var(--red-dark), #390909);

            font-weight: 700;

                justify-content: center;

                padding: 10px 20px;
                min-width: auto;
            }

                grid-template-rows: auto;
                grid-template-areas:

                    "dataset"
                    "network"
                    "loss";
                height: auto;
                min-height: 0;
                max-height: none;
            }

            .page-count {
                justify-content: start;
                margin-bottom: 0;
            }

            .phase::after {
                display: none;
            }

            #playground,
            #network {
                min-height: 360px;
            }

            #playground {
                max-height: none;
            }

            #loss-chart {
                min-height: 220px;
            }
        }

<body>

    <script id="neural-network-engine">
(function () {
    "use strict";

    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    function init(layerSizes) {
        const weights = [];
        const biases = [];
        for (let l = 0; l < layerSizes.length - 1; l++) {
            const fanIn = layerSizes[l];
            const fanOut = layerSizes[l + 1];
            const scale = Math.sqrt(1 / fanIn);
            const layerWeights = [];
            const layerBiases = [];
            for (let j = 0; j < fanOut; j++) {
                const neuronWeights = [];
                for (let k = 0; k < fanIn; k++) {
                    neuronWeights.push((Math.random() * 2 - 1) * scale);
                }
                layerWeights.push(neuronWeights);
                layerBiases.push(0);
            }
            weights.push(layerWeights);
            biases.push(layerBiases);
        }
        return { sizes: layerSizes.slice(), weights, biases };
    }

    function forward(net, input) {
        const activations = [input.slice()];
        const preActivations = [input.slice()];
        let currentInput = input.slice();
        for (let l = 0; l < net.weights.length; l++) {
            const layerPre = [];
            const layerAct = [];
            for (let j = 0; j < net.weights[l].length; j++) {
                let sum = net.biases[l][j];
                for (let k = 0; k < currentInput.length; k++) {
                    sum += net.weights[l][j][k] * currentInput[k];
                }
                layerPre.push(sum);
                layerAct.push(sigmoid(sum));
            }
            preActivations.push(layerPre);
            activations.push(layerAct);
            currentInput = layerAct;
        }
        return { activations, preActivations };
    }

    function computeLoss(predictions, targets) {
        let totalLoss = 0;
        for (let i = 0; i < predictions.length; i++) {
            for (let j = 0; j < predictions[i].length; j++) {
                const error = predictions[i][j] - targets[i][j];
                totalLoss += error * error;
            }
        }
        return totalLoss / predictions.length;
    }

    function backward(net, input, target) {
        const result = forward(net, input);
        const activations = result.activations;
        const numLayers = net.weights.length;
        const weightGradients = net.weights.map((layer) => layer.map((neuron) => neuron.map(() => 0)));
        const biasGradients = net.biases.map((layer) => layer.map(() => 0));
        const deltas = [];
        const outputLayer = numLayers - 1;
        const outputDeltas = [];

        for (let j = 0; j < net.weights[outputLayer].length; j++) {
            const activation = activations[outputLayer + 1][j];
            const error = activation - target[j];
            outputDeltas.push(2 * error * activation * (1 - activation));
        }
        deltas[outputLayer] = outputDeltas;

        for (let l = outputLayer - 1; l >= 0; l--) {
            const layerDeltas = [];
            for (let j = 0; j < net.weights[l].length; j++) {
                let sum = 0;
                for (let k = 0; k < net.weights[l + 1].length; k++) {
                    sum += deltas[l + 1][k] * net.weights[l + 1][k][j];
                }
                const activation = activations[l + 1][j];
                layerDeltas.push(sum * activation * (1 - activation));
            }
            deltas[l] = layerDeltas;
        }

        for (let l = 0; l < numLayers; l++) {
            for (let j = 0; j < net.weights[l].length; j++) {
                for (let k = 0; k < net.weights[l][j].length; k++) {
                    weightGradients[l][j][k] = deltas[l][j] * activations[l][k];
                }
                biasGradients[l][j] = deltas[l][j];
            }
        }

        return { weightGradients, biasGradients };
    }

    function updateParameters(net, gradients, learningRate) {
        for (let l = 0; l < net.weights.length; l++) {
            for (let j = 0; j < net.weights[l].length; j++) {
                for (let k = 0; k < net.weights[l][j].length; k++) {
                    net.weights[l][j][k] -= learningRate * gradients.weightGradients[l][j][k];
                }
                net.biases[l][j] -= learningRate * gradients.biasGradients[l][j];
            }
        }
    }

    function trainStep(net, samples, learningRate) {
        const totalWeightGrads = net.weights.map((layer) => layer.map((neuron) => neuron.map(() => 0)));
        const totalBiasGrads = net.biases.map((layer) => layer.map(() => 0));
        const predictions = [];

        for (const sample of samples) {
            const grads = backward(net, sample.input, sample.target);
            for (let l = 0; l < net.weights.length; l++) {
                for (let j = 0; j < net.weights[l].length; j++) {
                    for (let k = 0; k < net.weights[l][j].length; k++) {
                        totalWeightGrads[l][j][k] += grads.weightGradients[l][j][k];
                    }
                    totalBiasGrads[l][j] += grads.biasGradients[l][j];
                }
            }
            predictions.push(forward(net, sample.input).activations.at(-1));
        }

        for (let l = 0; l < net.weights.length; l++) {
            for (let j = 0; j < net.weights[l].length; j++) {
                for (let k = 0; k < net.weights[l][j].length; k++) {
                    totalWeightGrads[l][j][k] /= samples.length;
                }
                totalBiasGrads[l][j] /= samples.length;
            }
        }

        updateParameters(net, { weightGradients: totalWeightGrads, biasGradients: totalBiasGrads }, learningRate);
        return {
            loss: computeLoss(predictions, samples.map((sample) => sample.target)),
            predictions,
        };
    }

    function getState(net) {
        return {
            sizes: net.sizes.slice(),
            weights: net.weights.map((layer) => layer.map((neuron) => neuron.slice())),
            biases: net.biases.map((layer) => layer.slice()),
        };
    }

    function clamp01(value) {
        return Math.max(0, Math.min(1, value));
    }

    function generateCosineData(count) {
        const data = [];
        for (let i = 0; i < count; i++) {
            const x = Math.random();
            const noise = (Math.random() - 0.5) * 0.12;
            const boundary = 0.5 * (1 + Math.cos(x * Math.PI * 2));
            const y = Math.random();
            data.push({ input: [x, clamp01(y + noise)], target: [y < boundary ? 0 : 1] });
        }
        return data;
    }

    window.NeuralNetwork = {
        sigmoid,
        init,
        forward,
        computeLoss,
        backward,
        updateParameters,
        trainStep,
        getState,
        generateCosineData,
    };
}());
    </script>

    <script>

    const speedInput = { value: "4" };

    const width = 520;

    let running = false;

    let lossHistory = [];
    let maxTrainingEpochs = 30000;
    let lastActivations = Engine.forward(net, [0.5, 0.5]).activations;
    let lastGradients = null;

    function svgEl(name, attrs = {}) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", name);
        for (const [key, value] of Object.entries(attrs)) {
            el.setAttribute(key, value);
        }
        return el;
    }

    function plotX(x) {
        return pad + x * (width - pad * 2);
    }

    function plotY(y) {
        return height - pad - y * (height - pad * 2);
    }

    function colorMix(value, alpha = 0.18) {
        const c0 = [22, 69, 31];
        const c1 = [141, 31, 31];
        const r = Math.round(c0[0] * (1 - value) + c1[0] * value);
        const g = Math.round(c0[1] * (1 - value) + c1[1] * value);
        const b = Math.round(c0[2] * (1 - value) + c1[2] * value);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderPlayground() {
        playground.textContent = "";
        const grid = 40;
        const cellW = (width - pad * 2) / grid;
        const cellH = (height - pad * 2) / grid;

        for (let gy = 0; gy < grid; gy++) {
            for (let gx = 0; gx < grid; gx++) {
                const input = [(gx + 0.5) / grid, (gy + 0.5) / grid];
                const output = Engine.forward(net, input).activations.at(-1)[0];
                playground.appendChild(svgEl("rect", {
                    x: pad + gx * cellW,
                    y: height - pad - (gy + 1) * cellH,
                    width: cellW + 0.4,
                    height: cellH + 0.4,
                    fill: colorMix(output),
                }));
            }
        }

        for (let i = 0; i <= 10; i++) {
            const x = pad + i * (width - pad * 2) / 10;
            const y = pad + i * (height - pad * 2) / 10;
            playground.appendChild(svgEl("line", { x1: x, y1: pad, x2: x, y2: height - pad, class: "grid-line" }));
            playground.appendChild(svgEl("line", { x1: pad, y1: y, x2: width - pad, y2: y, class: "grid-line" }));
        }
        playground.appendChild(svgEl("line", { x1: pad, y1: height - pad, x2: width - pad, y2: height - pad, class: "axis-line" }));
        playground.appendChild(svgEl("line", { x1: pad, y1: pad, x2: pad, y2: height - pad, class: "axis-line" }));
        playground.appendChild(svgEl("line", { x1: width - pad, y1: height - pad, x2: width - pad - 9, y2: height - pad - 5, class: "axis-line" }));
        playground.appendChild(svgEl("line", { x1: width - pad, y1: height - pad, x2: width - pad - 9, y2: height - pad + 5, class: "axis-line" }));
        playground.appendChild(svgEl("line", { x1: pad, y1: pad, x2: pad - 5, y2: pad + 9, class: "axis-line" }));
        playground.appendChild(svgEl("line", { x1: pad, y1: pad, x2: pad + 5, y2: pad + 9, class: "axis-line" }));
        const xLabel = svgEl("text", { x: width - pad + 10, y: height - pad + 6, class: "axis-label" });
        xLabel.textContent = "x";
        playground.appendChild(xLabel);
        const yLabel = svgEl("text", { x: pad - 8, y: pad - 12, class: "axis-label" });
        yLabel.textContent = "y";
        playground.appendChild(yLabel);

        for (const sample of samples) {
            playground.appendChild(svgEl("circle", {
                cx: plotX(sample.input[0]),
                cy: plotY(sample.input[1]),
                r: 5,
                fill: sample.target[0] === 1 ? red : green,
                class: "point",
            }));
        }
    }

    function showTip(event, lines) {
        tooltip.textContent = lines.join("\n");
        tooltip.style.display = "block";
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 14}px`;
    }

    function hideTip() {
        tooltip.style.display = "none";
    }

    function renderNetwork() {
        networkSvg.textContent = "";
        const layers = [2, 3, 2, 3, 1];
        const xs = [40, 155, 280, 405, 520];
        const positions = [];

        const gap = 58;
        const centerY = 130;
        for (let l = 0; l < layers.length; l++) {
            positions[l] = [];
            const offset = (layers[l] - 1) * gap / 2;
            for (let j = 0; j < layers[l]; j++) {
                positions[l][j] = {
                    x: xs[l],
                    y: centerY - offset + j * gap,
                };
            }
        }

        for (let l = 0; l < net.weights.length; l++) {
            for (let j = 0; j < net.weights[l].length; j++) {
                for (let k = 0; k < net.weights[l][j].length; k++) {
                    const w = net.weights[l][j][k];
                    const grad = lastGradients ? lastGradients.weightGradients[l][j][k] : 0;
                    const start = positions[l][k];
                    const end = positions[l + 1][j];
                    const dx = end.x - start.x;
                    const dy = end.y - start.y;
                    const segLen = Math.hypot(dx, dy) || 1;
                    const nx = -dy / segLen;
                    const ny = dx / segLen;
                    const cpOffset = dx * 0.4;
                    const forwardWidth = Math.max(1, 0.5 + Math.min(3, Math.abs(w) * 2));
                    const backwardWidth = Math.max(1, 0.5 + Math.min(3, Math.log2(1 + Math.abs(grad) * 200) * 1.2));
                    const forwardShift = forwardWidth / 2 + 0.5;
                    const backwardShift = backwardWidth / 2 + 0.5;

                    // 前向传播：下方（+n 方向）
                    const fsx = start.x + nx * forwardShift;
                    const fsy = start.y + ny * forwardShift;
                    const fex = end.x + nx * forwardShift;
                    const fey = end.y + ny * forwardShift;
                    const forwardLine = svgEl("path", {
                        d: `M${fsx},${fsy} C${fsx + cpOffset},${fsy} ${fex - cpOffset},${fey} ${fex},${fey}`,
                        stroke: green,
                        "stroke-width": forwardWidth,
                        fill: "none",
                        class: "connection",
                    });
                    forwardLine.addEventListener("mousemove", (event) => showTip(event, [`weight: ${w.toFixed(4)}`]));
                    forwardLine.addEventListener("mouseleave", hideTip);
                    networkSvg.appendChild(forwardLine);

                    // 反向传播：上方（-n 方向），也从左到右绘制
                    const bsx = start.x - nx * backwardShift;
                    const bsy = start.y - ny * backwardShift;
                    const bex = end.x - nx * backwardShift;
                    const bey = end.y - ny * backwardShift;
                    const backwardLine = svgEl("path", {
                        d: `M${bsx},${bsy} C${bsx + cpOffset},${bsy} ${bex - cpOffset},${bey} ${bex},${bey}`,
                        stroke: red,
                        "stroke-width": backwardWidth,
                        fill: "none",
                        class: "connection",
                    });
                    backwardLine.addEventListener("mousemove", (event) => showTip(event, [`gradient: ${grad.toFixed(4)}`]));
                    backwardLine.addEventListener("mouseleave", hideTip);
                    networkSvg.appendChild(backwardLine);
                }
            }
        }

        for (let l = 0; l < layers.length; l++) {
            const label = svgEl("text", { x: xs[l], y: 244, "text-anchor": "middle", class: "layer-label" });
            label.textContent = ["输入", "隐藏 1", "隐藏 2", "隐藏 3", "输出"][l];
            networkSvg.appendChild(label);

            for (let j = 0; j < layers[l]; j++) {
                const activation = lastActivations[l]?.[j] ?? 0;
                const shade = Math.round(245 - activation * 155);
                const circle = svgEl("circle", {
                    cx: positions[l][j].x,
                    cy: positions[l][j].y,
                    r: 22,
                    fill: `rgb(${shade}, ${shade}, ${shade})`,
                    class: "neuron",
                });
                circle.addEventListener("mousemove", (event) => {
                    const bias = l === 0 ? "input" : net.biases[l - 1][j].toFixed(4);
                    showTip(event, [`activation: ${activation.toFixed(4)}`, `bias: ${bias}`]);
                });
                circle.addEventListener("mouseleave", hideTip);
                networkSvg.appendChild(circle);

                const value = svgEl("text", {
                    x: positions[l][j].x,
                    y: positions[l][j].y + 4,
                    "text-anchor": "middle",
                    class: "tiny-label",
                    fill: activation > 0.65 ? paper : ink,
                });
                value.textContent = activation.toFixed(2);
                networkSvg.appendChild(value);
            }
        }
    }

    function renderLossChart() {
        lossChart.textContent = "";
        const left = 44;
        const right = 420;
        const top = 18;
        const bottom = 104;
        const chartWidth = right - left;
        const chartHeight = bottom - top;
        const minEpoch = 0;
        const maxEpoch = maxTrainingEpochs;
        const maxLoss = Math.max(...lossHistory.map((item) => item.loss), 0.001);

        lossChart.appendChild(svgEl("line", { x1: left, y1: bottom, x2: right, y2: bottom, stroke: "#d8d3cc" }));
        lossChart.appendChild(svgEl("line", { x1: left, y1: top, x2: left, y2: bottom, stroke: "#d8d3cc" }));

        for (let i = 0; i <= 4; i++) {
            const y = bottom - i * chartHeight / 4;
            const value = maxLoss * i / 4;
            lossChart.appendChild(svgEl("line", { x1: left, y1: y, x2: right, y2: y, stroke: "#e5ded2", "stroke-dasharray": "3 4" }));
            const label = svgEl("text", { x: left - 8, y: y + 4, "text-anchor": "end", class: "tiny-label" });
            label.textContent = value.toFixed(value >= 0.1 ? 1 : 2);
            lossChart.appendChild(label);
        }

        for (let i = 0; i <= 4; i++) {
            const x = left + i * chartWidth / 4;
            const value = minEpoch + (maxEpoch - minEpoch) * i / 4;
            lossChart.appendChild(svgEl("line", { x1: x, y1: top, x2: x, y2: bottom, stroke: "#e5ded2", "stroke-dasharray": "3 4" }));
            const label = svgEl("text", { x, y: bottom + 18, "text-anchor": "middle", class: "tiny-label" });
            label.textContent = Math.round(value);
            lossChart.appendChild(label);
        }

        const yTitle = svgEl("text", { x: 12, y: top + 5, class: "tiny-label" });
        yTitle.textContent = "Loss";
        lossChart.appendChild(yTitle);
        const xTitle = svgEl("text", { x: right, y: bottom + 38, "text-anchor": "end", class: "tiny-label" });
        xTitle.textContent = "Epoch";
        lossChart.appendChild(xTitle);
        if (lossHistory.length < 2) return;

        const sampled = lossHistory.filter((item) => item.epoch % Math.max(1, Math.floor(maxTrainingEpochs / 200)) === 0);
        if (sampled.length < 2) return;
        const points = sampled.map((item) => {
            const x = left + ((item.epoch - minEpoch) / Math.max(1, maxEpoch - minEpoch)) * chartWidth;
            const y = bottom - (item.loss / maxLoss) * chartHeight;
            return `${x},${y}`;
        });
        lossChart.appendChild(svgEl("polyline", {
            points: points.join(" "),
            fill: "none",
            stroke: red,
            "stroke-width": 2,
        }));
    }

    function setPhase(nextPhase) {
        phase = nextPhase;
        for (const el of phaseEls) {
            el.classList.toggle("active", Number(el.dataset.phase) === phase);
        }
    }

    function updateMetrics() {
        epochValue.textContent = String(epoch);
        lossValue.textContent = latestLoss.toFixed(4);
    }

    function trainOnce() {
        if (samples.length === 0) return;
        if (epoch >= maxTrainingEpochs) {
            running = false;
            toggleRun.querySelector(".icon-play").style.display = "block";
            toggleRun.querySelector(".icon-pause").style.display = "none";
            toggleRun.querySelector(".btn-label-play").style.display = "inline";
            toggleRun.querySelector(".btn-label-pause").style.display = "none";
            return;
        }
        setPhase(0);
        lastActivations = Engine.forward(net, samples[epoch % samples.length].input).activations;
        setPhase(1);
        const learningRate = Number(lrInput.value);
        setPhase(2);
        const sampleForGrad = samples[epoch % samples.length];
        lastGradients = Engine.backward(net, sampleForGrad.input, sampleForGrad.target);
        const result = Engine.trainStep(net, samples, learningRate);
        setPhase(3);
        latestLoss = result.loss;
        epoch++;
        lossHistory.push({ epoch, loss: latestLoss });
        if (lossHistory.length > maxTrainingEpochs) lossHistory.shift();
        updateMetrics();
        renderNetwork();
        renderLossChart();
        if (epoch % 2 === 0) renderPlayground();
    }

    function animationLoop() {
        if (running) {
            const steps = Number(speedInput.value);
            for (let i = 0; i < steps; i++) trainOnce();
        }
        requestAnimationFrame(animationLoop);
    }

    function resetNetwork() {
        net = Engine.init([2, 3, 2, 3, 1]);
        epoch = 0;
        latestLoss = 0;
        lossHistory = [];
        lastActivations = Engine.forward(net, [0.5, 0.5]).activations;
        setPhase(0);
        updateMetrics();
        renderPlayground();
        renderNetwork();
        renderLossChart();
    }

    toggleRun.addEventListener("click", () => {
        running = !running;
        toggleRun.querySelector(".icon-play").style.display = running ? "none" : "block";
        toggleRun.querySelector(".icon-pause").style.display = running ? "block" : "none";
        toggleRun.querySelector(".btn-label-play").style.display = running ? "none" : "inline";
        toggleRun.querySelector(".btn-label-pause").style.display = running ? "inline" : "none";
    });
    document.getElementById("reset-net").addEventListener("click", resetNetwork);
    lrInput.addEventListener("input", () => {
        lrLabel.textContent = Number(lrInput.value).toFixed(2);
    });
    maxEpochInput.addEventListener("input", () => {
        maxTrainingEpochs = Number(maxEpochInput.value);
        maxEpochLabel.textContent = maxTrainingEpochs;
    });
    const initialPredictions = samples.map((s) => Engine.forward(net, s.input).activations.at(-1));
    lossHistory.push({ epoch: 0, loss: Engine.computeLoss(initialPredictions, samples.map((s) => s.target)) });
    renderPlayground();
    renderNetwork();
    renderLossChart();
    animationLoop();
}());
    </script>
</body>
</html>
