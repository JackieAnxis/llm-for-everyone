<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="20 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">大模型推理过程概览</title>
  <desc id="desc">从用户问题到聊天模板、token、模型预测、采样，再回到上下文的推理闭环。</desc>
  <rect width="1200" height="760" fill="#f7f7f4"/>
  <g fill="none" stroke="#111" stroke-width="2">
    <rect x="95" y="82" width="1036" height="596" rx="28"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#111">
    <text x="600" y="135" text-anchor="middle" font-size="42" font-weight="700">推理不是一次写完，而是循环生成</text>
    <text x="600" y="184" text-anchor="middle" font-size="22" fill="#555">MiniMind 接到问题后，会反复预测下一个 token</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g fill="#fff" stroke="#111" stroke-width="2">
    <rect x="110" y="286" width="160" height="92" rx="18"/>
    <rect x="322" y="286" width="160" height="92" rx="18"/>
    <rect x="534" y="286" width="160" height="92" rx="18"/>
    <rect x="746" y="286" width="160" height="92" rx="18"/>
    <rect x="958" y="286" width="160" height="92" rx="18"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle" fill="#111">
    <text x="190" y="326" font-size="24" font-weight="700">输入问题</text>
    <text x="190" y="356" font-size="18" fill="#555">自然语言</text>
    <text x="402" y="326" font-size="24" font-weight="700">聊天模板</text>
    <text x="402" y="356" font-size="18" fill="#555">整理 prompt</text>
    <text x="614" y="326" font-size="24" font-weight="700">切成 token</text>
    <text x="614" y="356" font-size="18" fill="#555">变成 token id</text>
    <text x="826" y="326" font-size="24" font-weight="700">模型预测</text>
    <text x="826" y="356" font-size="18" fill="#555">输出候选分数</text>
    <text x="1038" y="326" font-size="24" font-weight="700">采样选择</text>
    <text x="1038" y="356" font-size="18" fill="#555">得到新 token</text>
  </g>
  <g fill="none" stroke="#111" stroke-width="2.4" marker-end="url(#arrow)">
    <path d="M270 332h44"/>
    <path d="M482 332h44"/>
    <path d="M694 332h44"/>
    <path d="M906 332h44"/>
  </g>
  <g>
    <path d="M1038 404 C1038 548 858 606 618 606 C378 606 190 548 190 404" fill="none" stroke="#111" stroke-width="2.4" marker-end="url(#arrow)"/>
    <rect x="416" y="552" width="368" height="78" rx="18" fill="#fff" stroke="#111" stroke-width="2"/>
    <text x="600" y="584" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111">拼回上下文</text>
    <text x="600" y="614" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#555">新 token 成为下一轮输入的一部分</text>
  </g>
  <g transform="translate(132 455)">
    <rect width="314" height="58" rx="16" fill="#111"/>
    <text x="157" y="37" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#fff">停止条件：结束符或最大长度</text>
  </g>
  <g transform="translate(804 455)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="260" height="58" rx="16" fill="#ecebe6" stroke="#111" stroke-width="2"/>
    <text x="130" y="37" text-anchor="middle" font-size="20" fill="#111">答案逐步长出来</text>
  </g>
  <g fill="#111">
    <circle cx="180" cy="220" r="5"/>
    <circle cx="1020" cy="220" r="5"/>
    <circle cx="180" cy="650" r="5"/>
    <circle cx="1020" cy="650" r="5"/>
  </g>
</svg>
